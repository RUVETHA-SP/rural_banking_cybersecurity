<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f4f6f9;
}

/* Navbar */

.navbar{
background:#2c5364;
color:white;
padding:15px 30px;
font-size:20px;
font-weight:bold;
}

.logout{
float:right;
color:white;
text-decoration:none;
font-size:16px;
}

/* Container */

.container{
padding:30px;
}

/* Cards */

.card-container{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
flex:1;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{
color:#2c5364;
margin-bottom:10px;
}

/* Section */

.section{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* Security alert */

.alert{
background:#ffe6e6;
border-left:5px solid red;
padding:15px;
margin-bottom:20px;
border-radius:5px;
}

/* Inputs */

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

/* Button */

button{
padding:10px 20px;
background:#2c5364;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#203a43;
}

</style>

</head>

<body>

<div class="navbar">
🔐 Rural Secure Banking Dashboard
<a href="/" class="logout">Logout</a>
</div>

<div class="container">

<!-- Top Cards -->

<div class="card-container">

<div class="card">
<h3>Welcome</h3>
<p>{{ user }}</p>
</div>

<div class="card">
<h3>Account Balance</h3>
<p>₹ {{ balance }}</p>
</div>

<div class="card">
<h3>Security Status</h3>
<p>Protected</p>
</div>

</div>

<!-- Security Alert -->

<div class="alert">
<strong>Security Alert:</strong> No suspicious activity detected
</div>

<!-- Transfer Section -->

<div class="section">

<h3>Transfer Money</h3>

<form action="/transfer" method="post">

<input type="number" name="amount" placeholder="Enter Amount">

<button type="submit">Send Money</button>

</form>

</div>

<!-- Phishing Checker -->

<div class="section">

<h3>Check Suspicious Link</h3>

<form action="/check_link" method="post">

<input type="text" name="url" placeholder="Enter website URL">

<button type="submit">Check Link</button>

</form>

</div>

</div>

</body>
</html>
