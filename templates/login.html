<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Rural Digital Banking</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* Simple background */

body{
height:100vh;
background:#2c5364;
display:flex;
justify-content:center;
align-items:center;
}

/* Login Box */

.login-box{
background:rgba(255,255,255,0.85);
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

/* Heading */

.login-box h2{
color:#2c5364;
margin-bottom:25px;
}

/* Input fields */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:12px;
background:#2c5364;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#203a43;
}

/* Footer */

.footer{
margin-top:15px;
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Rural Secure Bank</h2>

<form action="/login" method="post">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
Cyber Protected Digital Banking
</div>

</div>

</body>
</html>
